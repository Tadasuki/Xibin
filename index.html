<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <title>嘻斌库 · 通三全集</title>
  <meta name="description" content="围绕嘻斌库 JSON 的日期切片、辩论阵营、关键词与思维导图可视化页面。">
  <link rel="icon" type="image/png" href="./assets/icons/favicon.png">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preload" href="./assets/fonts/OPPO-Sans-4.0.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@wc1font/source-han-serif-sc-vf/font.css">
  <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-kicker">Xi bin</div>
      <div id="loadingTitle" class="loading-title">正在划龙舟<br>进入通三河<br>.</div>
    </div>
  </div>
  <div id="mobileRailBackdrop" class="mobile-rail-backdrop"></div>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Xi bin</div>
        <h1>嘻斌库</h1>
        <div class="hero-link-row" style="margin-top: 24px; margin-bottom: 12px;">
          <a href="./articles.html" class="soft-button"
            style="display: inline-flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: 500; letter-spacing: 0.02em; padding: 0 28px; min-height: 52px; font-size: 15px; border-color: var(--accent); color: var(--accent); background: var(--paper); box-shadow: 0 6px 20px rgba(197, 124, 86, 0.12); transition: all 0.2s ease;">
            <span style="font-size: 18px;">📚</span> 查看斌说说 →
          </a>
          <a href="./恋斌场.html" class="soft-button"
            style="display: inline-flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: 500; letter-spacing: 0.02em; padding: 0 28px; min-height: 52px; font-size: 15px; border-color: var(--accent-2); color: var(--accent-2); background: var(--paper); box-shadow: 0 6px 20px rgba(112, 135, 127, 0.12); transition: all 0.2s ease; margin-left: 10px;">
            <span style="font-size: 18px;">💞</span> 查看恋斌场 →
          </a>
        </div>
        <p id="heroDescription"></p>
        <div id="globalSearchPanel"></div>
        <div id="heroMetrics" class="hero-metrics"></div>
        <section id="overview" class="overview-grid overview-inline"></section>
        <div class="hero-actions">
          <span id="updatedChip" class="status-chip subdued">尚未载入</span>
          <button id="refreshButton" class="soft-button" type="button">立即刷新数据</button>
        </div>
      </div>

      <div class="hero-side">
        <section class="hero-panel">
          <div class="panel-kicker">高压日期</div>
          <div id="spotlightPanel"></div>
        </section>
        <section class="hero-panel">
          <div class="panel-kicker">人物刻度</div>
          <div id="networkPanel"></div>
        </section>
      </div>
    </header>

    <section class="content-grid">
      <aside class="left-column">
        <section class="card rail-card">
          <div class="section-head">
            <div>
              <h2>内容列表</h2>
            </div>
            <button class="mobile-close-button" type="button" data-mobile-close="rail">收起</button>
          </div>
          <div id="sessionRail" class="session-rail"></div>
        </section>
      </aside>

      <main class="right-column">
        <section class="card focus-card" id="focusAnchor">
          <div id="focusPanel"></div>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <h2>阵营分析</h2>
            </div>
          </div>
          <div id="campPanel"></div>
        </section>

        <section class="card transcript-card" id="transcriptAnchor">
          <div class="section-head">
            <div>
              <h2>原始对话流</h2>
            </div>
          </div>
          <div id="transcriptPanel"></div>
        </section>
      </main>
    </section>

    <section class="contributors-section" aria-labelledby="contributorsTitle">
      <div class="contributors-head">
        <div>
          <div class="section-kicker">Contributors</div>
          <h2 id="contributorsTitle">贡献者</h2>
        </div>
      </div>
      <div class="contributors-list">
        <article class="contributor-card">
          <div class="contributor-avatar">C</div>
          <div>
            <div class="contributor-name">Codex</div>
            <div class="contributor-role">AI coding collaborator</div>
          </div>
        </article>
      </div>
    </section>
  </div>
  <div class="mobile-dock">
    <button class="mobile-dock-button" type="button" data-mobile-action="toggle-rail">内容列表</button>
    <button class="mobile-dock-button" type="button" data-jump-target="focusAnchor">当前内容</button>
    <button class="mobile-dock-button" type="button" data-jump-target="transcriptAnchor">原始对话</button>
  </div>

  <script src="./src/app.js"></script>
</body>

</html>
