<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <title>恋斌场 - 嘻斌库</title>
  <meta name="description" content="通三哥情感史整理页，收录关键聊天、感情线与情感图。">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preload" href="./assets/fonts/OPPO-Sans-4.0.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@wc1font/source-han-serif-sc-vf/font.css">
  <link rel="stylesheet" href="./styles.css">
  <style>
    #transcriptPanel::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    #transcriptPanel {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--brown-soft);
      color: var(--muted);
      border: 1px solid var(--brown-soft-2);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s ease;
      width: fit-content;
    }

    .nav-link:hover {
      background: var(--brown-soft-2);
      color: var(--text);
      transform: translateX(-2px);
    }

    .focus-facts.story-summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .fact-card.full-width {
      grid-column: 1 / -1;
    }

    .fact-value {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      white-space: normal;
    }

    .fact-value.long-text {
      font-size: 14px;
      line-height: 1.7;
      font-weight: 400;
    }

    .message-content {
      font-size: 17px;
      line-height: 1.85;
    }

    .message-card.target {
      background:
        radial-gradient(circle at top right, rgba(197, 124, 86, 0.08), transparent 28%),
        rgba(197, 124, 86, 0.05);
    }

    @media (max-width: 760px) {
      .focus-facts.story-summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-card">
      <div class="loading-kicker">Xi bin love archive</div>
      <div class="loading-title">正在翻斌的<br>感情旧账<br>.</div>
    </div>
  </div>
  <div id="mobileRailBackdrop" class="mobile-rail-backdrop"></div>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <a href="./index.html" class="nav-link">
          <span>←</span> 返回对话流首页
        </a>
        <div class="eyebrow">Xi bin · Romance Archive</div>
        <h1>恋斌场</h1>
        <p id="heroDescription">通三哥情感史整理页，优先收录能看出试探、落差、投射与现实判断的关键片段。</p>
        <div id="globalSearchPanel"></div>
        <div id="heroMetrics" class="hero-metrics"></div>
        <section id="overview" class="overview-grid overview-inline"></section>
        <div class="hero-actions">
          <span id="updatedChip" class="status-chip subdued">尚未载入</span>
          <button id="refreshButton" class="soft-button" type="button">立即刷新数据</button>
        </div>
      </div>
    </header>

    <section class="content-grid">
      <aside class="left-column">
        <section class="card rail-card">
          <div class="section-head">
            <div>
              <h2>情感条目</h2>
            </div>
            <button class="mobile-close-button" type="button" data-mobile-close="rail">收起</button>
          </div>
          <div id="sessionRail" class="session-rail"></div>
        </section>
      </aside>

      <main class="right-column">
        <section class="card focus-card" id="focusAnchor">
          <div id="focusPanel"></div>
        </section>

        <section class="card transcript-card" id="transcriptAnchor">
          <div class="section-head">
            <div>
              <h2>原始聊天</h2>
            </div>
          </div>
          <div id="transcriptPanel"></div>
        </section>
      </main>
    </section>
  </div>
  <div class="mobile-dock">
    <button class="mobile-dock-button" type="button" data-mobile-action="toggle-rail">情感条目</button>
    <button class="mobile-dock-button" type="button" data-jump-target="focusAnchor">感情线</button>
    <button class="mobile-dock-button" type="button" data-jump-target="transcriptAnchor">原始聊天</button>
  </div>

  <script src="./恋斌场.js"></script>
</body>

</html>
